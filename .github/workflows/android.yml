name: Android CI (Build APK)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # الخطوة الجديدة لإنشاء الملف الناقص تلقائياً
    - name: Create dummy .env.example file
      run: touch .env.example

    - name: Build with Gradle
      run: gradle assembleDebug
